<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap" rel="stylesheet">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt hàng thành công</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
</head>
<body class="flex flex-col justify-center items-center bg-[#f1f2f6] overflow-x-hidden">
    <div class="navb flex flex-row h-[80px] w-[100vw] justify-between mb-[50px] bg-[#01ac50] text-white shadow-[0_5px_15px_rgba(0,0,0,0.35)]">
        <div class="infor-shop h-[80px] w-fit flex flex-row justify-center items-center ml-2">
            <img class="w-[50px] h-[50px] rounded-[999px] ml-[20px]" src="/img/tienhungw.jpg" alt="">
            <h2 class="text-[30px] font-medium ml-[10px] mt-[10px] font-['Kaushan_Script']">TH Shop</h2>
        </div>

        <div class="relative h-[80px] w-[50vw] absolute right-[20px]">
            <div class="flex flex-row absolute gap-[30px] right-[20px] bottom-[6px] text-lg font-normal">
                <a class="cursor-pointer" href="/user/home">Trang chủ</a>
                <a class="cursor-pointer" href="/user/cart">Giỏ hàng</a>
                <a class="cursor-pointer underline" style="text-underline-offset: 4px; text-decoration-thickness: 2px;" href="/user/history">Lịch sử</a>
                <a class="cursor-pointer" href="/user/about">Thông tin</a>
                <a class="cursor-pointer" href="/logout">Đăng xuất</a>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-lg p-10 w-[600px] flex flex-col items-center mt-10">
        <div class="w-[120px] h-[120px] rounded-full bg-[#e7f7ec] flex justify-center items-center mb-6">
            <box-icon name='check-circle' type='solid' color='#01ac50' size='80px'></box-icon>
        </div>

        <h1 class="text-3xl font-semibold text-[#127332] mb-3">Đặt hàng thành công!</h1>
        <p class="text-base text-gray-600 text-center mb-2">
            Cảm ơn bạn đã mua sắm tại <span class="font-['Kaushan_Script'] text-[#01ac50]">TH Shop</span>.
        </p>
        <p class="text-base text-gray-600 text-center mb-8">
            Đơn hàng của bạn đã được xác nhận và đang được xử lý.
        </p>

        <div class="flex flex-row gap-4">
            <a href="/user/history" class="bg-[#01ac50] hover:bg-[#017a39] text-white text-base font-medium w-[200px] h-[48px] rounded-lg flex justify-center items-center">
                <box-icon name='receipt' color='white' class="mr-2"></box-icon>
                Xem lịch sử đơn hàng
            </a>
            <a href="/user/home" class="bg-white hover:bg-gray-100 border border-[#01ac50] text-[#01ac50] text-base font-medium w-[200px] h-[48px] rounded-lg flex justify-center items-center">
                <box-icon name='store' color='#01ac50' class="mr-2"></box-icon>
                Tiếp tục mua sắm
            </a>
        </div>
    </div>

    <div class="w-[100vw] mt-[80px] mb-5 ml-1 flex-col text-center mb-10">
        <div class="text-lg font-medium text-gray-600 text-center mb-2">
            © 2025 Bản quyền thuộc về TH Shop
        </div>
        <div class="text-lg font-normal text-gray-600 text-center">
            Cảm ơn quý khách đã tin tưởng và ủng hộ cửa hàng!
        </div>
    </div>
<div th:replace="~{fragments/chatbox :: chatbox}"></div>
</body>
</html>
