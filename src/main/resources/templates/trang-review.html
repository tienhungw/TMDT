<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Đánh giá sản phẩm</title>
  <style>
    body {
      width: 80%;
      margin: auto;
      font-family: Arial, sans-serif;
    }

    .content {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    img {
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .product-name {
      margin-top: 10px;
      font-weight: bold;
      text-align: center;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    textarea,
    select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
        box-sizing: border-box;
    }

    button {
      padding: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

<h2>Đánh giá sản phẩm: "<span th:text="${product.name}"></span>"</h2>

<div class="content">
  <div>
    <img th:src="@{${product.imageUrl}}" alt="Hình ảnh" width="254px" height="254px">
    <div class="product-name" th:text="${product.name}"></div>
  </div>

  <div>
    <form method="post" th:action="@{/user/review/save}" th:object="${review}">
      <input type="hidden" name="productId" th:value="${product.id}" />
      <input type="hidden" name="orderDetailId" th:value="${orderDetail.id}" />

      <label for="content">Nội dung:</label>
      <textarea name="content" id="content" rows="4" required></textarea>

      <label for="rating">Số sao:</label>
      <select name="rating" id="rating" required>
        <option value="" disabled selected>Chọn số sao</option>
        <option value="1">1 sao</option>
        <option value="2">2 sao</option>
        <option value="3">3 sao</option>
        <option value="4">4 sao</option>
        <option value="5">5 sao</option>
      </select>

      <button type="submit">Gửi đánh giá</button>
    </form>
  </div>
</div>
<div th:replace="~{fragments/chatbox :: chatbox}"></div>
</body>
</html>
