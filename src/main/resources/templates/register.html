<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="flex items-center justify-center h-screen bg-gray-100">
<form th:action="@{/register}" th:object="${user}" method="post" class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Đăng ký</h2>
    <div class="mb-4">
        <label for="username" class="block text-sm font-medium text-gray-700">Tên đăng nhập</label>
        <input type="text" id="username" th:field="*{username}" class="w-full border p-2 rounded mt-1">
    </div>
    <div class="mb-4">
        <label for="full_name" class="block text-sm font-medium text-gray-700">Họ tên</label>
        <input type="text" id="full_name" th:field="*{full_name}" class="w-full border p-2 rounded mt-1">
    </div>
    <div class="mb-4">
        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" id="email" th:field="*{email}" class="w-full border p-2 rounded mt-1">
    </div>
    <div class="mb-4">
        <label for="phone" class="block text-sm font-medium text-gray-700">Số điện thoại</label>
        <input type="text" id="phone" th:field="*{phone}" class="w-full border p-2 rounded mt-1">
    </div>
    <div class="mb-4">
        <label for="password" class="block text-sm font-medium text-gray-700">Mật khẩu</label>
        <input type="password" id="password" th:field="*{password}" class="w-full border p-2 rounded mt-1">
    </div>
    <div class="mb-6">
        <label for="address" class="block text-sm font-medium text-gray-700">Địa chỉ</label>
        <input type="text" id="address" th:field="*{address}" class="w-full border p-2 rounded mt-1">
    </div>
    <button type="submit" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Đăng ký</button>
</form>
</body>
</html>
