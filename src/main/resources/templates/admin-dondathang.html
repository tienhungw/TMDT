        </div>
        <div class="mt-2">
            <table class="min-w-full border border-white table-fixed border-collapse">
                <thead>
                    <tr class="bg-[#0EBC50]">
                        <th class="border border-white w-[30px] h-[40px] text-white text-lg font-medium">Mã đơn</th>
                        <th class="border border-white w-[50px] h-[40px] text-white text-lg font-medium">Họ tên</th>
                        <th class="border border-white w-[60px] h-[40px] text-white text-lg font-medium">Địa chỉ</th>
                        <th class="border border-white w-[50px] h-[40px] text-white text-lg font-medium">Giá trị</th>
                        <th class="border border-white w-[70px] h-[40px] text-white text-lg font-medium">Trạng thái</th>
                        <th class="border border-white w-[60px] h-[40px] text-white text-lg font-medium">Thao tác</th>
                    </tr>
                </thead>
                <tbody class="bg-[#dfe4ea] justify-center items-center">
                    <tr th:each="order : ${orders}">
                        <td class="border border-white w-[100px] p-2 overflow-hidden text-ellipsis whitespace-normal text-center " th:text="${order.id}"></td>
                        <td class="border border-white w-[150px] p-2 text-center justify-center items-center" th:text="${order.user.full_name}"></td>
                        <td class="border border-white w-[200px] p-2 text-center" th:text="${order.user.address}"></td>
                        <td class="border border-white w-[150px] p-2 text-center" th:text="${order.totalPrice}"></td>
                        <td class="border border-white w-[150px] p-2 text-center">
                            <form th:action="@{/admin/order/status}" method="post">
                                <input type="hidden" name="orderId" th:value="${order.id}" />
                                <div class="content-set">
                                    <div class="select-container">
                                        <select name="status" class="status-select">
                                            <option th:each="status : ${statusList}"
                                                    th:value="${status}"
                                                    th:text="${status}"
                                                    th:selected="${status == order.status}"
                                                    th:classappend="${status}">Status</option>
                                        </select>
                                    </div>
                                    <div>
                                        <button class="btn-set rounded-sm px-2 bg-green-500 text-white" type="submit">Save</button>
                                    </div>
                                </div>
                            </form>
                        </td>
                        <td class="border border-white w-[150px] p-2 text-center">
                            <div class="flex flex-col gap-1 items-center">
<!--                                <button class="text-lg font-medium text-white w-[70%] h-auto bg-[#DAB10C] rounded-xl cursor-pointer" id="chitiet1">-->

                            </div>
                        </td>
