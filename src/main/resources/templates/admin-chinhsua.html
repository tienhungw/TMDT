  <meta charset="UTF-8">

  <title>Admin chỉnh sửa</title>

<body class="flex flex-col justify-center items-center bg-[#f1f2f6] overflow-x-hidden">
<div class="navb flex flex-row h-[80px] w-[100vw] justify-between mb-[50px] bg-[#01ac50] text-white shadow-[0_5px_15px_rgba(0,0,0,0.35)]">
  <div class="infor-shop h-[80px] w-fit flex flex-row justify-center items-center ml-2">
    <img class="w-[50px] h-[50px] rounded-[999px] ml-[20px]" src="/img/tienhungw.jpg" alt="">
    <h2 class="text-[30px] font-medium ml-[10px] mt-[10px] font-['Kaushan_Script']">TH Shop</h2>
  </div>

  <div class="relative h-[80px] w-[50vw]">
    <div class="flex flex-row absolute gap-[20px] right-[20px] bottom-[10px] text-lg font-normal">
      <a id="gotoPage1" class="cursor-pointer underline" style="text-underline-offset: 4px; text-decoration-thickness: 2px;" href="/admin/products">Sản phẩm</a>
      <a id="gotoPage2" class="cursor-pointer" href="/admin/order">Đơn đặt hàng</a>
      <a id="gotoPage3" class="cursor-pointer" href="/admin/customer">Khách hàng</a>
      <a id="gotoPage4" class="cursor-pointer" href="/logout">Đăng xuất</a>
    </div>
  </div>
</div>

<div class="w-[80vw] h-fit relative">
  <p class="text-3xl font-normal text-[#127332]">TRANG CỦA NGƯỜI QUẢN LÝ</p>
  <div class="flex flex-row justify-between mt-8">
    <p class="text-2xl font-normal text-black">Chỉnh sửa thông tin sản phẩm</p>
  </div>

  <div class="flex flex-col absolute w-[350px] h-[650px] bg-white rounded-lg left-[50%] -translate-x-[50%] mt-8">
    <form method="post" th:action="@{/admin/save}" th:object="${product}" enctype="multipart/form-data">
      <input type="hidden" name="id" th:field="*{id}" readonly="readonly">
      <div class="mt-4 mb-2">
        <p class="text-sm font-light ml-[35px] text-gray-800">Tên sản phẩm</p>
        <input class="w-[280px] h-[35px] ml-[35px] border border-gray-600 outline-none rounded-sm p-2 placeholder-black" type="text" name="name" id="name" th:field="*{name}" placeholder="Nhập tên sản phẩm">
      </div>
      <div class="mb-2">
        <p class="text-sm font-light ml-[35px] text-gray-800">Phân loại sản phẩm</p>
        <!-- <input class="w-[280px] h-[35px] ml-[35px] border border-gray-600 outline-none rounded-sm p-2" type="text" placeholder="Chọn loại sản phẩm"> -->
        <select id="chonLoai" name="chonLoai" class="w-[280px] h-[35px] ml-[35px] border border-gray-600 rounded-sm pl-1 outline-none" th:field="*{category.id}">
          <option value="" disabled selected>Chọn loại sản phẩm</option>
          <option th:each="category : ${categories}"
                  th:value="${category.id}"
                  th:text="${category.name}">Máy ảnh</option>
        </select>
      </div>
      <!--                <div class="mb-2">-->
      <!--                    <p class="text-sm font-light ml-[35px] text-gray-800">Hình ảnh</p>-->
      <!--                    <label for="fileInput" class="block w-[280px] h-[35px] ml-[35px] border border-gray-600 rounded-sm p-2 cursor-pointer text-black">-->
      <!--                        <span id="fileName">Tải hình ảnh lên</span>-->
      <!--                    </label>-->
      <!--                    <input id="fileInput" type="file" accept="image/*" class="hidden">-->
      <!--                </div>-->
<!--      <div class="mb-2">-->
<!--        <p class="text-sm font-light ml-[35px] text-gray-800">Hình ảnh</p>-->
<!--        <input class="w-[280px] h-[35px] ml-[35px] border border-gray-600 outline-none rounded-sm p-2 placeholder-black" id="fileInput" name="fileInput" type="text" th:field="*{imageUrl}" placeholder="Chọn hình ảnh">-->
<!--      </div>-->
<!--      <div class="mb-2">-->
<!--        <label for="fileInput" class="text-sm font-light ml-[35px] text-gray-800">Hình ảnh</label>-->
<!--        <input class="w-[280px] h-[35px] ml-[35px] border border-gray-600 outline-none rounded-sm p-2 placeholder-black" type="file" name="fileInput" id="fileInput" accept="image/*" required>-->
<!--      </div>-->
      <div class="mb-2 ml-[35px]">
        <label>Ảnh hiện tại:</label><br>
        <img th:src="@{${product.imageUrl}}" alt="Ảnh sản phẩm" width="80"><br>
        <input type="hidden" th:field="*{imageUrl}">
        <label for="fileInput">Chọn ảnh mới</label>
        <input class="w-[280px] h-[35px] border border-gray-600 outline-none rounded-sm p-2 placeholder-black" type="file" name="fileInput" id="fileInput" accept="image/*">
      </div>
      <div class="mb-2">
        <p class="text-sm font-light ml-[35px] text-gray-800">Giá bán</p>
        <input class="w-[280px] h-[35px] ml-[35px] border border-gray-600 outline-none rounded-sm p-2 placeholder-black" type="number" id="giaBan" name="giaBan" th:field="*{price}" placeholder="Nhập giá bán">
      </div>
      <div class="mb-2">
        <p class="text-sm font-light ml-[35px] text-gray-800">Tồn kho</p>
        <input class="w-[280px] h-[35px] ml-[35px] border border-gray-600 outline-none rounded-sm p-2 placeholder-black" type="number" id="tonKho" name="tonKho" th:field="*{quantity}" placeholder="Nhập số lượng sản phẩm">
      </div>
      <div class="mb-2">
        <p class="text-sm font-light ml-[35px] text-gray-800">Mô tả</p>
        <textarea class="w-[280px] h-[80px] ml-[35px] border border-gray-600 outline-none rounded-sm p-2 resize-none text-black" id="moTa" name="moTa" th:field="*{description}" ></textarea>
      </div>
      <div class="">
        <button class="text-xl font-medium text-white w-[100px] h-[40px] bg-[#0EBC50] rounded-lg mb-2 ml-[215px] mt-4 cursor-pointer" type="submit">
          Lưu lại
        </button>
      </div>
    </form>
  </div>
</div>

<div class="w-[60vw] h-[30px] mt-[750px] mb-5 ml-1">
  <p class="text-lg font-nomarl text-gray-600 text-center">
    © 2025 Bản quyền thuộc về TH Shop

</div>
